name: Check official policy sources

on:
  schedule:
    - cron: "17 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check official sources
        run: python scripts/check_sources.py

      - name: Commit source-watch updates
        run: |
          if git diff --quiet -- data/source-watch.json; then
            echo "No source-watch changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source-watch.json
          git commit -m "Update official source watch data"
          git push
